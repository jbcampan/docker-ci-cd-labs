name: Docker Build & Push to GHCR — Lab 03

on:
  push:
    branches: ["main"]
    paths:
      - "github-actions/lab-03-docker-build/**"
      - ".github/workflows/github-actions-lab-03.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "github-actions/lab-03-docker-build/**"
      - ".github/workflows/github-actions-lab-03.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/lab-03-app

jobs:
  # ── Job 1: run unit tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-actions/lab-03-docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: github-actions/lab-03-docker-build/app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run pytest
        run: pytest app/test_main.py -v

  # ── Job 2: build and push image ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Produces two tags:
      #   ghcr.io/<owner>/<repo>/lab-03-app:latest
      #   ghcr.io/<owner>/<repo>/lab-03-app:sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cache-from/cache-to with type=gha stores layer cache between runs
      # in the GitHub Actions cache (up to 10 GB, free).
      # On PRs: build only (validates Dockerfile). On main: build + push.
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: github-actions/lab-03-docker-build
          file: github-actions/lab-03-docker-build/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Print image digest
        run: echo "Image digest -> ${{ steps.build-push.outputs.digest }}"

  # ── Job 3: verify the pushed image is pullable ───────────────────────────────
  verify:
    name: Verify Pull
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and run health check
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Pulling $IMAGE ..."
          docker pull "$IMAGE"

          echo "Starting container ..."
          docker run -d --name lab03-verify -p 8000:8000 "$IMAGE"

          echo "Waiting for container to be ready ..."
          sleep 5

          echo "Calling /health endpoint ..."
          curl --fail --retry 5 --retry-delay 2 http://localhost:8000/health

          echo "Calling / endpoint ..."
          curl --fail http://localhost:8000/

          echo "Stopping container ..."
          docker stop lab03-verify
          docker rm lab03-verify
