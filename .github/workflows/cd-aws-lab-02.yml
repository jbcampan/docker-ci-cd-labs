# ─────────────────────────────────────────────────────────────────────────────
# cd-aws-lab-02 — CI/CD pipeline: test → build → push ECR → deploy ECS
#
# Auth: GitHub OIDC — no long-lived AWS keys stored in GitHub.
# Deploy: official aws-actions/* actions (the idiomatic approach).
# ─────────────────────────────────────────────────────────────────────────────
name: cd-aws-lab-02 — ECS Deploy

on:
  push:
    branches: [main]
    paths:
      - "cd-aws/lab-02-ecs-deploy/**"
      - ".github/workflows/cd-aws-lab-02.yml"
  workflow_dispatch:

# Cancel any in-progress run on the same branch to avoid race conditions on ECS.
concurrency:
  group: ecs-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:     eu-west-3
  CONTAINER_NAME: app
  LAB_DIR:        cd-aws/lab-02-ecs-deploy

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & test
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.LAB_DIR }}/app/requirements.txt

      - name: Install dependencies
        working-directory: ${{ env.LAB_DIR }}/app
        run: pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: ${{ env.LAB_DIR }}/app
        run: |
          pip install flake8
          flake8 main.py --max-line-length=100

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 — Build, push to ECR, deploy to ECS
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy ECS
    runs-on: ubuntu-latest
    needs: test

    permissions:
      id-token: write   # required for OIDC token exchange with AWS STS
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── OIDC authentication ───────────────────────────────────────────────
      # GitHub generates a short-lived JWT for this run.
      # AWS verifies it against the OIDC provider created by Terraform and
      # issues temporary STS credentials — no static keys involved.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push ──────────────────────────────────────────────────────
      # Tag with the short commit SHA so every image is uniquely traceable.
      # `latest` is also pushed for convenience (bootstrap / manual pulls).
      - name: Build & push Docker image
        working-directory: ${{ env.LAB_DIR }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${{ secrets.ECR_URI }}:${IMAGE_TAG}"

          docker build -t "$IMAGE_URI" -t "${{ secrets.ECR_URI }}:latest" .
          docker push "$IMAGE_URI"
          docker push "${{ secrets.ECR_URI }}:latest"

          # Write to GITHUB_ENV so the next steps can reference $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      # ── Render task definition ────────────────────────────────────────────
      # Reads task-definition.json from the repo, replaces the `image` field
      # for the named container with the newly pushed URI, and outputs a
      # temporary file path containing the updated JSON.
      # This is the recommended alternative to manually patching JSON with
      # Python or jq — the action handles field stripping (revision,
      # taskDefinitionArn, etc.) automatically.
      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.LAB_DIR }}/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}

      # ── Deploy ────────────────────────────────────────────────────────────
      # Registers the rendered JSON as a new task definition revision, then
      # calls update-service with the new revision ARN.
      # `wait-for-service-stability: true` blocks until ECS reports:
      #   runningCount == desiredCount  AND  pendingCount == 0
      # If the ALB health check fails on the new task, ECS keeps the old task
      # running, the wait times out, and this step fails — alerting you.
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Smoke test ────────────────────────────────────────────────────────
      # Hits the ALB /health endpoint up to 5 times with 10 s back-off.
      # A real pipeline would also run integration / e2e tests here.
      - name: Smoke test via ALB
        run: |
          ALB=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'ecs-lab02')].DNSName | [0]" \
            --output text)

          echo "Testing http://${ALB}/health"

          for i in {1..5}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${ALB}/health")
            if [ "$CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP 200)"
              exit 0
            fi
            echo "  attempt ${i}: HTTP ${CODE} — retrying in 10s"
            sleep 10
          done

          echo "❌ Health check did not return 200 after 5 attempts"
          exit 1
