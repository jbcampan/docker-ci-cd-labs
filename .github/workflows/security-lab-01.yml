      # - name: Push image to ECR
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   run: |
      #     docker tag "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
      #       "${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
      #     docker push \
