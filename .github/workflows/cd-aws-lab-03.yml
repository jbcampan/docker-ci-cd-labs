# ─────────────────────────────────────────────────────────────────────────────
# cd-aws-lab-03 — Staging → Production pipeline using GitHub Environments
#
# Flow on every push to main:
#   test  →  build & push ECR (once)  →  deploy-staging (auto)  →  deploy-production (manual gate)
#
# Authentication: GitHub OIDC, one IAM role PER GitHub Environment. The role
# trust policy in Terraform matches on `environment:<name>` in the OIDC
# token's `sub` claim, so a job that doesn't declare `environment:` (or
# declares the wrong one) cannot assume either role — even on main.
#
# Approval gate: deploy-production only starts once `deploy-staging` has
# succeeded (`needs:`) AND a required reviewer has approved the run in the
# GitHub UI (configured on the `production` Environment's protection rules,
# not in this YAML file — see README).
# ─────────────────────────────────────────────────────────────────────────────
name: cd-aws-lab-03 — Staging/Production Environments

on:
  push:
    branches: [main]
    paths:
      - "cd-aws/lab-03-environments/**"
      - ".github/workflows/cd-aws-lab-03.yml"
  workflow_dispatch:

concurrency:
  group: ecs-lab03-${{ github.ref }}
  cancel-in-progress: false # never cancel mid-deploy to production

env:
  AWS_REGION:     eu-west-3
  CONTAINER_NAME: app
  LAB_DIR:        cd-aws/lab-03-environments

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & test (same for both environments — one image, one test run)
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.LAB_DIR }}/app/requirements.txt

      - name: Install dependencies
        working-directory: ${{ env.LAB_DIR }}/app
        run: pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: ${{ env.LAB_DIR }}/app
        run: |
          pip install flake8
          flake8 main.py --max-line-length=100

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 — Build once, push once
  #
  # The image is built and pushed to the SHARED ECR repo exactly once per
  # pipeline run. Both staging and production deploy this exact same image
  # digest — staging never gets a "different build" than what reaches prod.
  # This job does NOT declare `environment:`, so it uses the repo-level
  # AWS_ROLE_ARN_PUSH secret (a role with ECR push rights only, no ECS
  # rights) — see README for why a third, narrowly-scoped role is used here.
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (shared image)
    runs-on: ubuntu-latest
    needs: test

    permissions:
      id-token: write
      contents: read

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PUSH }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        id: image
        working-directory: ${{ env.LAB_DIR }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${{ secrets.ECR_URI }}:${IMAGE_TAG}"

          docker build -t "$IMAGE_URI" -t "${{ secrets.ECR_URI }}:latest" .
          docker push "$IMAGE_URI"
          docker push "${{ secrets.ECR_URI }}:latest"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3 — Deploy to STAGING (automatic — no approval gate)
  #
  # `environment: staging` does two things:
  #   1. Scopes `secrets.*` in this job to the staging Environment's secrets.
  #   2. Sends an `environment:staging` claim in the OIDC token, which is
  #      the only thing the staging IAM role's trust policy accepts.
  # The `staging` GitHub Environment has NO protection rules — it deploys
  # the instant the build finishes, which is the point: staging is where you
  # catch problems before a human has to make a judgment call.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: ${{ steps.smoke.outputs.alb_url }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — staging role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.LAB_DIR }}/task-definition.staging.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image_uri }}

      - name: Deploy to ECS (staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test via ALB (staging)
        id: smoke
        run: |
          ALB=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'ecs-lab03-staging')].DNSName | [0]" \
            --output text)

          echo "alb_url=http://${ALB}" >> "$GITHUB_OUTPUT"
          echo "Testing http://${ALB}/health"

          for i in {1..5}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${ALB}/health")
            if [ "$CODE" = "200" ]; then
              echo "✅ Staging health check passed (HTTP 200)"
              exit 0
            fi
            echo "  attempt ${i}: HTTP ${CODE} — retrying in 10s"
            sleep 10
          done

          echo "❌ Staging health check did not return 200 after 5 attempts"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4 — Deploy to PRODUCTION (manual gate)
  #
  # `needs: deploy-staging` means this job cannot even be QUEUED until
  # staging has deployed and passed its smoke test.
  # `environment: production` is what makes GitHub pause this job and wait:
  # the `production` Environment's protection rules (required reviewer,
  # 5-minute wait timer, main-only) are evaluated here, BEFORE any step in
  # this job runs — including before the OIDC token is even requested.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: ${{ steps.smoke.outputs.alb_url }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — production role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.LAB_DIR }}/task-definition.production.json
          container-name: ${{ env.CONTAINER_NAME }}
          # Same image digest that was just validated on staging — never
          # rebuilt, never re-tagged differently.
          image: ${{ needs.build-and-push.outputs.image_uri }}

      - name: Deploy to ECS (production)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test via ALB (production)
        id: smoke
        run: |
          ALB=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'ecs-lab03-production')].DNSName | [0]" \
            --output text)

          echo "alb_url=http://${ALB}" >> "$GITHUB_OUTPUT"
          echo "Testing http://${ALB}/health"

          for i in {1..5}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${ALB}/health")
            if [ "$CODE" = "200" ]; then
              echo "✅ Production health check passed (HTTP 200)"
              exit 0
            fi
            echo "  attempt ${i}: HTTP ${CODE} — retrying in 10s"
            sleep 10
          done

          echo "❌ Production health check did not return 200 after 5 attempts"
          exit 1
