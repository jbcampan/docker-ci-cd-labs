[pytest]
# Run from the app/ directory so that "from app import ..." resolves correctly.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add app/ itself to sys.path so that "from app import ..." resolves.
pythonpath = .

# Show short summary of all failures/errors at the end.
addopts = -v --tb=short