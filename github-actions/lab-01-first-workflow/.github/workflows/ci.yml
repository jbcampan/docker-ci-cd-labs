# .github/workflows/ci.yml
#
# CI pipeline — Lab 01
# Triggered on every push and pull request targeting any branch.
# Steps: checkout → setup Python → install deps → run tests
#
# Runs on: ubuntu-latest (GitHub-hosted runner)
# Cost: free for public repos, counted against the 2 000 min/month quota for private repos.

name: CI

on:
  push:
    branches:
      - "**"           # all branches
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest   # GitHub-managed VM: Ubuntu 22.04, ~4 GB RAM, 2 vCPUs

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]   # test against two versions

    steps:
      # ── Step 1 ── Checkout the repository ─────────────────────────────────
      # The action "actions/checkout" clones the repo onto the runner.
      # Without this step, no source files are available on the machine.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2 ── Set up the Python interpreter ────────────────────────────
      # "actions/setup-python" installs the requested Python version and adds
      # it to PATH. It also enables pip caching to speed up subsequent runs.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"                   # cache ~/.cache/pip between runs
          cache-dependency-path: app/requirements.txt

      # ── Step 3 ── Install dependencies ────────────────────────────────────
      # `pip install -r requirements.txt` reads the pinned versions and
      # installs them into the runner's Python environment.
      # The `--no-deps` flag is NOT used here so that transitive deps are
      # installed correctly.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      # ── Step 4 ── Run tests ────────────────────────────────────────────────
      # pytest discovers tests automatically based on pytest.ini settings.
      # --cov generates a coverage report displayed in the job log.
      - name: Run tests with pytest
        working-directory: app
        run: |
          pytest --cov=. --cov-report=term-missing