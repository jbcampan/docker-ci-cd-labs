# Minimal reverse proxy configuration for lab03
# nginx is the sole entry point exposed to the host (port 8080 -> 80)

events {
    worker_connections 1024;
}

http {

    upstream api {
        # Docker's internal DNS resolves "api" to the api container
        server api:3000;
    }

    server {
        listen 80;
        server_name _;

        # Proxy all traffic to the API
        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Expose nginx own health check without hitting the API
        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}